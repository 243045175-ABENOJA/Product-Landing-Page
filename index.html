<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Solo Bazaar Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <div class="logo">SOLO Bazaar Hub</div>

      <div class="search_bar">
        <input type="text" placeholder="Search in Solo Bazaar Hub" />
        <button>Search</button>
      </div>

      <div class="icon">🛒 👤</div>
    </header>

    <main>
      <h2>Products near you</h2>

      <div class="product">
        <div class="product_card">
          <img src="https://via.placeholder.com/300x200" alt="Jeans" />
          <div class="product_info">
            <h4>Jeans</h4>
            <div class="price">Php 180</div>
          </div>
        </div>

        <div class="product_card">
          <img src="https://via.placeholder.com/300x200" alt="Shorts" />
          <div class="product_info">
            <h4>Shorts (Male/Female)</h4>
            <div class="price">Php 299</div>
          </div>
        </div>

        <div class="product_card">
          <img src="https://via.placeholder.com/300x200" alt="Cycling Shoes" />
          <div class="product_info">
            <h4>Cycling Shoes</h4>
            <div class="price">Php 299</div>
          </div>
        </div>

        <div class="product_card">
          <img src="https://via.placeholder.com/300x200" alt="Adidas Shoes" />
          <div class="product_info">
            <h4>Adidas Shoes</h4>
            <div class="price">Php 3,499</div>
          </div>
        </div>

        <div class="product_card">
          <img src="https://via.placeholder.com/300x200" alt="Nike Shoes" />
          <div class="product_info">
            <h4>Nike Shoes</h4>
            <div class="price">Php 2,999</div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <a href="#">About Us</a>
      <a href="#">Contact Us</a>
      <a href="#">FAQ</a>
      <a href="#">Help</a>
      <p>&copy; 2026 Solo Bazaar Hub. All rights reserved.</p>
    </footer>
  </body>
</html>
